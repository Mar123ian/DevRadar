{% extends 'core/base.html' %}

{% block title %}
    <title>DevRadar | Редактиране на коментар</title>
{% endblock %}

{% block main_content %}

<form
    method="post"
    enctype="multipart/form-data"
    class="comments-update-form"
>
    {% csrf_token %}

    <div class="comments-delete-form__fields">
        {{ form }}
    </div>

    <button
        type="submit"
        class="comments-delete-form__button comments-delete-form__button--danger"
    >
        Запази
    </button>
</form>
{% endblock %}
